events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;
        server_name localhost;
        port_in_redirect on;    # Indique à Nginx d'inclure son port dans les redirections
        absolute_redirect off; # Préfère les redirections relatives (plus sûr en Docker)

        # --- Reverse Proxy vers le Serveur API ---
        location /gameNR/api/ {
            # On réécrit l'URL en supprimant /gameNR
            # Le (.*) capture la suite du chemin, et $1 le réinjecte
            rewrite ^/gameNR/(.*)$ /$1 permanent;

            proxy_pass http://gameNR_api:3000; 
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }

        # --- Support des WebSockets ---
        location /gameNR/ws/ {
            rewrite ^/gameNR/(.*)$ /$1 permanent;

            proxy_pass http://gameNR_api:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }
       
        # --- Serveur Web (Frontend) ---
        location / {
            root /usr/share/nginx/html;
            index index.html;
            
            rewrite ^/gameNR/(.*)$ /$1 permanent;
            try_files $uri $uri/ /index.html;
        }
    }
}