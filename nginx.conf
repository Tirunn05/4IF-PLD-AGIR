events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Configuration du serveur
    server {
        listen 80;
        server_name localhost;

        # --- Reverse Proxy vers le Serveur API (Node.js) ---
        # On utilise /api sans l'expression régulière complexe pour plus de fiabilité
        location /api/ {
            # On retire le /api/ à la fin pour laisser Nginx gérer le chemin proprement
            proxy_pass http://gameNR_api:3000; 
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Empêche les redirections de fuiter le port interne 3000
            proxy_redirect off;
        }

        # --- Support des WebSockets ---
        location /ws/ {
            proxy_pass http://gameNR_api:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }
       
        # --- Serveur Web (Frontend) ---
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;

            # Désactiver le cache pour forcer le navigateur à voir tes modifs JS
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }
}