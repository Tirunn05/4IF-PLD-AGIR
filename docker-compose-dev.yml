version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: workspaces/api/Dockerfile
    container_name: gameNR_api
    ports:
      - "3000:3000"
    environment:
      DATABASE_USER: postgres
      DATABASE_PASSWORD: 4damantium!
      DATABASE_HOST: db       
      DATABASE_PORT: 5432
      DATABASE_NAME: BPGIT-DB 

      CORS_ALLOW_ORIGIN: http://localhost:8083

    depends_on:
      - db
    networks:
      - smart-network

  front:
    build:
      context: .
      dockerfile: workspaces/front/Dockerfile
    container_name: gameNR_front
    ports:
      - "8083:80"
    networks:
      - smart-network
    depends_on:
      - api

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 4damantium!
      POSTGRES_DB: BPGIT-DB
    container_name: gameNR_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - smart-network

networks:
  smart-network:

volumes:
  postgres_data:
