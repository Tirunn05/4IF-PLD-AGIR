server {
    listen 80;
    server_name localhost;

    # --- Reverse Proxy vers le Serveur API (Node.js) ---
    # Gère les routes /api et /ws
    location ~ ^/(api|ws)/ {
        proxy_pass http://gameNR_api:3000/api/;
        
        # Headers standards pour le proxy
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # --- Support des WebSockets (indispensable pour /ws) ---
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Empêche Node de renvoyer son port 3000 au navigateur
        proxy_redirect off;
    }
   
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}